name: KRTP
version: 1.0.0
main: me.klouse.krtp.KRTP
api-version: '1.21'
authors: [Klouse]
description: Modern, safe, async-friendly random teleport plugin for Paper.

commands:
  rtp:
    description: Open the random teleport menu
    usage: /rtp

permissions:
  klouse.rtp.use:
    description: Use random teleport
    default: true
  klouse.rtp.admin:
    description: Reload KRTP
    default: op
  klouse.rtp.bypass.cooldown:
    description: Bypass RTP cooldowns
    default: op
  klouse.rtp.bypass.move:
    description: Ignore movement cancellation during RTP countdown
    default: op
